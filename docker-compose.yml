services:

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      SECRET_KEY: local-dev-secret-do-not-use-in-production
      DATABASE_URL: sqlite+aiosqlite:///./solar_dev.db
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
    volumes:
      # Mount source so --reload picks up changes without rebuilding the image
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Must be set at build time — baked into the Next.js rewrite proxy.
        # "backend" resolves to the backend service inside the Docker network.
        NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
